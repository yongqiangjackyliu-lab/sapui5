<!DOCTYPE html>
<html lang="en">
<head>
</head>
<script>
setTimeout(() => {
    let myPath = window.location.pathname
    let myPathWithoutFile = myPath.substring(0, myPath.lastIndexOf('/'))
    fetch(myPathWithoutFile + "/user-api/currentUser").then((res) => {
        return res.json();
    }).then((user) => {
        document.getElementsByTagName("body")[0].innerText = `Hi you ${user.firstname}!`
    });
}, 1000);
</script>
<body class="sapUiBody sapUiSizeCompact" id="content">
 Hello World
</body>
</html>
